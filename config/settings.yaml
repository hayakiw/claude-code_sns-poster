# =====================================================
# Threads投稿自動化 設定ファイル
# このファイルを編集すれば、テーマや出力先を簡単に変更できます
# =====================================================

# 投稿のジャンル・テーマ（ここを書き換えるだけでテーマ変更可能）
theme:
  genre: "AI・生成AI活用"                    # メインジャンル
  target_audience: "20-40代のビジネスパーソン"  # ターゲット層
  tone: "親しみやすく、専門用語は噛み砕く"      # 文体
  persona: "AIを実務で使いこなしている同僚"     # 投稿者の人格
  ng_words:                                  # 使ってほしくない表現
    - "絶対"
    - "誰でも稼げる"
    - "簡単に"

# 競合調査の対象キーワード（Xで検索するキーワード）
research:
  keywords:
    - "ChatGPT 活用"
    - "Claude 使い方"
    - "生成AI 業務効率化"
    - "AI 副業"
  min_likes: 500          # この「いいね」以上の投稿のみ参考にする
  lookback_hours: 48      # 何時間以内の投稿を対象にするか
  sample_size: 20         # 何件の人気投稿を分析するか

# 投稿生成設定
generation:
  posts_per_day: 3        # 1日あたり生成する投稿案数
  max_chars: 500          # Threadsの上限(500文字)
  schedule_times:         # 投稿予定時刻(翌日)
    - "07:00"
    - "12:00"
    - "19:00"

# スプレッドシート設定
spreadsheet:
  # 既存スプレッドシートのURLをここに貼り付け
  url: "https://docs.google.com/spreadsheets/d/XXXXXXXXXXXXXXXXXXXX/edit"
  sheet_name: "投稿管理"   # シートタブ名
  # 列の構成(変更不要、変える場合はsheet-loggerスキルも修正)
  columns:
    - "投稿予定日"
    - "投稿予定時間"
    - "プラットフォーム"
    - "投稿テキスト案"
    - "画像・動画リンク"
    - "ステータス"
